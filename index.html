<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>借还记账</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{max-width:500px;margin:0 auto;min-height:100vh;background:#f5f5f5}
a{color:inherit;text-decoration:none}

/* ---- Header ---- */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#07c160;color:#fff;position:sticky;top:0;z-index:100}
.h-left,.h-right{font-size:16px;cursor:pointer;min-width:40px}
.h-center{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:14px}
.h-title{font-weight:600;font-size:16px}
.h-arrow{font-size:10px}
.h-gear{font-size:20px}
/* ---- Content ---- */
.content{padding:12px 12px 70px}
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:500;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.card-title.red{color:#ee4d2d}
.card-title.orange{color:#e67e22}
.muted{color:#999;font-size:12px}
.more{font-size:13px;color:#07c160;cursor:pointer}
.empty{text-align:center;color:#999;padding:30px 0;font-size:13px}

/* ---- Stats ---- */
.stat-row2{display:flex;gap:10px;margin-bottom:10px}
.stat-box{flex:1;background:#f8f8f8;border-radius:8px;padding:10px;text-align:center}
.stat-label{font-size:11px;color:#999;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:500}
.stat-val.green,.green{color:#07c160}
.stat-val.blue,.blue{color:#4084ff}
.stat-row3{display:flex;gap:6px}
.stat-mini{flex:1;background:#f8f8f8;border-radius:8px;padding:8px;text-align:center}
.stat-mini-overdue{background:#fff0f0}
.mini-label{font-size:11px;color:#999;margin-bottom:2px}
.mini-val{font-size:15px;font-weight:500}
.red,.red-alert{color:#ee4d2d}
.orange,.orange-alert{color:#e67e22}
.alert-card{padding:10px 16px}
.alert-row{display:flex;gap:10px}
.alert-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px}
.red-badge{background:#ffeeee;color:#ee4d2d}
.orange-badge{background:#fff5e6;color:#e67e22}
.alert{padding:8px 12px;border-radius:8px;font-size:12px;margin-top:8px}
.red-alert{background:#ffeeee;border:1px solid #ffcccc}
.orange-alert{background:#fff5e6;border:1px solid #ffe0a0}

/* ---- Loan Row ---- */
.loan-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.loan-row:last-child{border-bottom:none}
.lr-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.lr-right{text-align:right;flex-shrink:0}
.lr-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.lr-amount{font-size:14px;font-weight:500}
.lr-status{font-size:11px;margin-left:8px}
.plan-tag{font-size:10px;color:#888;background:#f0f0f0;padding:2px 6px;border-radius:4px}
.income-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0}
.income-row:last-child{border-bottom:none}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;white-space:nowrap}
.tag-income{background:#e8f5e9;color:#2e7d32}
.tag-lend{background:#e8f5e9;color:#2e7d32}
.tag-borrow{background:#e3f2fd;color:#1565c0}
.tag-overdue{background:#ffebee;color:#c62828}
.tag-paid{background:#f5f5f5;color:#888}
.tag-active{background:#e8f5e9;color:#2e7d32}
.tag-coming{background:#fafafa;color:#aaa}

/* ---- Filter ---- */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.filter-item{padding:4px 10px;border-radius:14px;font-size:12px;background:#f0f0f0;color:#666;cursor:pointer;border:1px solid transparent}
.filter-item.f-active{background:#07c160;color:#fff;border-color:#07c160}
.search-bar{margin-bottom:4px}
.search-bar input{width:100%;border:1px solid #e0e0e0;border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
.search-bar input:focus{border-color:#07c160}

/* ---- Fab ---- */
.fab{position:fixed;bottom:80px;right:calc(50% - 220px);width:50px;height:50px;border-radius:50%;background:#07c160;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.2);cursor:pointer;z-index:50}
@media(max-width:540px){.fab{right:20px}}

/* ---- Form ---- */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#999;margin-bottom:4px}
.form-row2{display:flex;gap:12px}
.form-row2 .form-group{flex:1}
.f-input{width:100%;border:1px solid #e0e0e0;border-radius:8px;padding:8px 10px;font-size:14px;outline:none;background:#fff}
.f-input:focus{border-color:#07c160}
select.f-input{appearance:auto}
textarea.f-input{resize:vertical;min-height:50px}
.chk-label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.chk-label input{width:16px;height:16px}
.seg-control{display:flex;gap:0;border:1px solid #07c160;border-radius:8px;overflow:hidden}
.seg-item{flex:1;text-align:center;padding:8px 0;font-size:13px;color:#07c160;cursor:pointer;background:#fff;display:block}
.seg-item.seg-on{background:#07c160;color:#fff}

/* ---- Detail ---- */
.detail-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.detail-name{font-size:16px;font-weight:500}
.detail-contact{font-size:12px;color:#999;margin-bottom:8px}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.info-row:last-child{border-bottom:none}

/* ---- Plan Table ---- */
.plan-table{border:1px solid #eee;border-radius:8px;overflow-x:auto;font-size:12px;-webkit-overflow-scrolling:touch}
.plan-table-inner{min-width:460px}
.plan-tr{display:grid;grid-template-columns:36px 70px 1fr 1fr 1fr 60px;padding:6px 4px;border-bottom:1px solid #f0f0f0;align-items:center}
.plan-tr:last-child{border-bottom:none}
.plan-th{background:#f8f8f8;font-weight:500;color:#888;font-size:11px}
.plan-paid{background:#f8f8f8;color:#aaa}
.plan-next{background:#e8f5e9}
.plan-c{padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.plan-c:first-child{text-align:center}
.plan-c:nth-child(2){text-align:center}
.plan-act{text-align:center;cursor:pointer}

/* ---- Repayment Row ---- */
.rep-row{padding:8px 0;border-bottom:1px solid #f0f0f0}
.rep-row:last-child{border-bottom:none}
.rep-top{display:flex;justify-content:space-between;margin-bottom:4px}
.rep-amount{font-weight:500}
.rep-date{color:#999;font-size:12px}
.rep-bottom{display:flex;gap:8px;font-size:11px;color:#888}

/* ---- Reminder ---- */
.slide-row{display:flex;align-items:center;gap:12px;margin:8px 0}
.remind-card{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:6px;border-radius:8px;border-left:4px solid;cursor:pointer}
.remind-overdue{border-left-color:#ee4d2d;background:#fff8f8}
.remind-near{border-left-color:#e67e22;background:#fffcf5}

/* ---- Book ---- */
.book-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.book-name{font-size:14px}
.active-book{font-weight:500;color:#07c160}
.book-acts{font-size:12px}
.op{color:#07c160;cursor:pointer}
.op.red{color:#ee4d2d}

/* ---- Btn-line ---- */
.btn-line{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid #f0f0f0;font-size:14px;cursor:pointer}
.btn-line.no-border{border-bottom:none}

/* ---- Tabbar ---- */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:500px;width:100%;display:flex;background:#fff;border-top:1px solid #e8e8e8;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0 8px;font-size:10px;color:#888;cursor:pointer}
.tab-item.active{color:#07c160}
.tab-icon{font-size:20px;line-height:1;margin-bottom:2px}

/* ---- MISC ---- */
input[type="range"]{height:4px;accent-color:#07c160;cursor:pointer}
.btn{padding:10px 0;border:none;border-radius:8px;font-size:14px;cursor:pointer;text-align:center}
.btn-confirm{background:#07c160;color:#fff}
.btn-cancel{background:#f0f0f0;color:#333}
.btn-danger{background:#ee4d2d;color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<script src="js/store.js"></script>
<script src="js/calc.js"></script>
<script src="js/util.js"></script>
<script src="js/app.js"></script>
</body>
</html>
